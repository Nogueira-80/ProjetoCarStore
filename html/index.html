<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Store</title>
</head>
<body>
    <header>
        <h3>Cadastre seu veículo para vender mais rápido</h3>
    </header>
    <div>
        <div>
            <p>Formulário</p>
        </div>

        <div>
            <h1>Venda fácil seu carro!</h1>
            <p>Descreva as características do seu carro e marque os opcionais que ele possui</p>
            <form>
                <div>
                    <label for="title">Titulo do seu Anúncio <span>*</span></label>
                    <input type="text" name="title" id="title" placeholder="Um título para seu anúncio">
                </div>

                 <div>
                    <label for="title">Preço <span>*</span></label>
                    <input type="number" name="preco" id="preco" placeholder="Defina o preço">
                </div>

                <div>
                    <label for="descricao">Descrição <span>*</span></label>
                    <textarea name="descricao" id="descricao" placeholder="Faça sua Descrição"></textarea>
                </div>

                <div>
                    <label for="title">Marca<span>*</span></label>
                    <input type="text" name="marca" id="marca" placeholder="Marca do seu veículo">
                </div>

               <div>
                    <label for="title">Modelo <span>*</span></label>
                    <input type="text" name="modelo" id="modelo" placeholder="Modelo do seu veículo">
                </div>

                <div>
                    <label for="title">Quilometragem do veículo<span>*</span></label>
                    <input type="number" name="quilometragem" id="quilometragem" placeholder="Quilometragem do seu veículo">
                </div>
                
                <div>
                    <label for="title">data-de-compra<span>*</span></label>
                    <input type="date" name="data" id="data">
                </div>

                <div>
                   <p>Tipo de Câmbio: <span>*</span></p>
                    <input type="radio" name="marcha" id="manual">
                    <label for="manual">Manual</label>
                     <input type="radio" name="marcha" id="auto">
                    <label for="auto">Automático</label>
                </div>

                <div>
                    <p>Opcionais</p>
                    <ul>
                        <li>
                            <input type="checkbox" name="opicional[]" id="airbag" value="airbag">
                            <label for="airbag">Airbag</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicional[]" id="alarme" value="alarme">
                            <label for="alarme">Alarme</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicional[]" id="arcondicionado" value="arcondicionado">
                            <label for="arcondicionado">Ar Condicionado</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicional[]" id="cameradere" value="cameradere">
                            <label for="cameradere">Camera de Ré</label>
                        </li>
                    </ul>
                </div>

                 <div>
                    <ul>
                        <li>
                            <input type="checkbox" name="opicional[]" id="assistentedepista" value="assistentedepista">
                            <label for="assistentedepista">Assistente de Pista</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicional[]" id="partidasemchave" value="partidasemchave">
                            <label for="partidasemchave">Partida sem Chave</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicional[]" id="integracaocomcelular" value="integracaocomcelular">
                            <label for="integracaocomcelular">Integração com Celular</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicional[]" id="bancodecouro" value="bancodecouro">
                            <label for="bancodecouro">Banco de Couro</label>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
